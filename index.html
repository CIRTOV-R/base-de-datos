<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innova - Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- CDN Obligatorio de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <main class="contenedor">
        <h2>Iniciar Sesión</h2>
        <p class="subtitulo">Empresa Innova</p>
        
        <form id="form-login">
            <div class="campo">
                <input type="email" id="login-email" placeholder="Correo Electrónico" required>
            </div>
            <div class="campo">
                <input type="password" id="login-pass" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn-primario">Ingresar</button>
        </form>
        
        <div class="enlaces-pie">
            <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
        </div>
    </main>

    <!-- Tu lógica de JavaScript al final -->
    <script src="conexion.js"></script>
</body>
</html>
