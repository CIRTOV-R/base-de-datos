<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Innova - Panel de Datos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="contenedor-ancho">
        <h2>Datos de la Base de Datos (Tabla Clientes)</h2>
        <button onclick="cargarClientes()">Cargar / Actualizar Lista</button>
        
        <table border="1" id="tabla-clientes">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Empresa</th>
                    <th>Teléfono</th>
                    <th>Ciudad</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                </tbody>
        </table>
        <br>
        <a href="index.html">Cerrar Sesión</a>
    </div>

    <script src="conexion.js"></script>
</body>
</html>
