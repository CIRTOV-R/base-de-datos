<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innova - Registro</title>
    <link rel="stylesheet" href="style.css">
    <!-- CDN Obligatorio de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <main class="contenedor">
        <h2>Crear Nuevo Usuario</h2>
        <p class="subtitulo">Acceso al sistema Innova</p>
        
        <form id="form-registro">
            <div class="campo">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo" required>
            </div>
            <div class="campo">
                <input type="email" id="reg-email" placeholder="Correo Electrónico" required>
            </div>
            <div class="campo">
                <input type="password" id="reg-pass" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn-primario">Registrar Usuario</button>
        </form>
        
        <div class="enlaces-pie">
            <p><a href="index.html">Volver al Login</a></p>
        </div>
    </main>

    <script src="conexion.js"></script>
</body>
</html>
